<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>For Emily ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --midnight:#070417;
    --deep-blue:#0d1b3e;
    --night-violet:#1a0f3a;
    --diamond:#eaf3ff;
    --gold:#f3d488;
    --gold-soft:#e7c477;
    --silver:#dfe7f5;
    --amethyst:#c9a3ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:'Jost',sans-serif;color:var(--diamond);cursor:pointer;
    background:radial-gradient(130% 100% at 50% 12%, #16234d 0%, var(--night-violet) 42%, var(--midnight) 100%);
    position:relative;
  }
  /* starfield */
  #stars{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(1.4px 1.4px at 12% 18%, #fff, transparent),
      radial-gradient(1px 1px at 78% 12%, rgba(243,212,136,.9), transparent),
      radial-gradient(1.6px 1.6px at 33% 64%, #fff, transparent),
      radial-gradient(1px 1px at 64% 44%, rgba(201,163,255,.9), transparent),
      radial-gradient(1.2px 1.2px at 88% 72%, #fff, transparent),
      radial-gradient(1px 1px at 8% 82%, rgba(223,231,245,.8), transparent),
      radial-gradient(1.5px 1.5px at 50% 28%, rgba(243,212,136,.8), transparent),
      radial-gradient(1px 1px at 24% 40%, #fff, transparent),
      radial-gradient(1.2px 1.2px at 92% 30%, #fff, transparent),
      radial-gradient(1px 1px at 44% 88%, rgba(201,163,255,.7), transparent);
    opacity:.5;animation:drift 8s ease-in-out infinite;}
  @keyframes drift{0%,100%{opacity:.4;}50%{opacity:.7;}}

  .stage{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:30px;
    opacity:0;pointer-events:none;transition:opacity 1.1s ease, transform 1.1s ease;
    transform:translateY(12px);}
  .stage.active{opacity:1;pointer-events:auto;transform:translateY(0);}

  /* ---------- ACT 1 : line diamond ---------- */
  .diamond{width:150px;height:150px;cursor:pointer;position:relative;
    animation:breathe 3.4s ease-in-out infinite;}
  .diamond svg{width:100%;height:100%;display:block;overflow:visible;}
  .diamond .line{fill:none;stroke:url(#goldline);stroke-width:1.1;
    stroke-linejoin:round;stroke-linecap:round;
    filter:drop-shadow(0 0 6px rgba(243,212,136,.55));}
  @keyframes breathe{0%,100%{transform:scale(1);filter:drop-shadow(0 0 0 transparent);}
    50%{transform:scale(1.06);}}
  /* faint invitation ring */
  .ring{position:absolute;inset:-26px;border:1px solid rgba(243,212,136,.25);
    border-radius:50%;animation:ring 3.4s ease-out infinite;pointer-events:none;}
  @keyframes ring{0%{transform:scale(.7);opacity:.6;}80%{opacity:0;}100%{transform:scale(1.3);opacity:0;}}

  /* ---------- shared type ---------- */
  .eyebrow{font-family:'Jost';font-weight:300;letter-spacing:.42em;text-transform:uppercase;
    font-size:11px;color:var(--gold);margin-bottom:20px;opacity:.85;}
  .display{font-family:'Cormorant Garamond',serif;font-weight:500;line-height:1.05;
    font-size:clamp(40px,11vw,76px);
    background:linear-gradient(115deg,#fff 0%,var(--gold) 50%,var(--gold-soft) 75%,#fff 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 34px rgba(243,212,136,.22);}
  .display .name{font-style:italic;}
  .sub{font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:clamp(18px,4.6vw,26px);color:rgba(234,243,255,.82);margin-top:14px;}
  .cta{margin-top:38px;font-family:'Jost';font-weight:300;letter-spacing:.2em;
    text-transform:uppercase;font-size:11px;color:rgba(234,243,255,.6);
    border:1px solid rgba(243,212,136,.3);border-radius:999px;padding:13px 28px;
    background:rgba(255,255,255,.02);transition:.3s;animation:soft 2.6s ease-in-out infinite;}
  .cta:hover{color:#fff;border-color:var(--gold);box-shadow:0 0 22px rgba(243,212,136,.35);}
  @keyframes soft{0%,100%{opacity:.6;}50%{opacity:1;}}

  /* ---------- ACT 2 : frosted-glass cake ---------- */
  .cake{position:relative;width:210px;cursor:pointer;margin:0 auto;}
  .candle{position:absolute;top:-46px;left:50%;transform:translateX(-50%);
    width:5px;height:50px;border-radius:3px;z-index:3;
    background:linear-gradient(var(--gold),#fff7e3);box-shadow:0 0 8px rgba(243,212,136,.4);}
  .flame{position:absolute;top:-17px;left:50%;width:13px;height:20px;
    transform-origin:bottom center;
    background:radial-gradient(circle at 50% 75%,#fff 0%,#ffe9a8 35%,#ffae47 70%,rgba(255,120,40,.4) 100%);
    border-radius:50% 50% 50% 50%/62% 62% 38% 38%;
    box-shadow:0 0 18px 4px rgba(255,190,90,.7);
    animation:sway 1.6s ease-in-out infinite;}
  @keyframes sway{0%{transform:translateX(-50%) rotate(-5deg) scaleY(1);}
    50%{transform:translateX(-50%) rotate(5deg) scaleY(1.12);}
    100%{transform:translateX(-50%) rotate(-4deg) scaleY(.96);}}
  .cake.out .flame{animation:none;transform:translateX(-50%) scale(0);opacity:0;transition:.45s ease;}
  .smoke{position:absolute;top:-18px;left:50%;width:6px;height:6px;border-radius:50%;
    background:rgba(234,243,255,.55);opacity:0;}
  .cake.out .smoke{animation:smoke 1.3s ease-out forwards;}
  @keyframes smoke{0%{opacity:.6;transform:translate(-50%,0) scale(1);}
    100%{opacity:0;transform:translate(-60%,-46px) scale(2.4);}}
  .glass{position:relative;width:100%;height:104px;border-radius:14px;
    background:linear-gradient(160deg,rgba(255,255,255,.16),rgba(201,163,255,.08));
    backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);
    border:1px solid rgba(255,255,255,.28);
    box-shadow:0 20px 50px rgba(7,4,23,.6), inset 0 1px 0 rgba(255,255,255,.5);
    overflow:hidden;}
  .glass::before{content:"";position:absolute;top:0;left:-30%;width:55%;height:100%;
    background:linear-gradient(105deg,transparent,rgba(255,255,255,.35),transparent);
    transform:skewX(-18deg);animation:sheen 4.5s ease-in-out infinite;}
  @keyframes sheen{0%,60%{left:-40%;}85%,100%{left:120%;}}
  .glass .band{position:absolute;bottom:0;left:0;width:100%;height:30px;
    background:linear-gradient(90deg,var(--gold),var(--amethyst),var(--gold));opacity:.55;}
  .cake-hint{margin-top:28px;font-family:'Jost';font-weight:300;letter-spacing:.2em;
    text-transform:uppercase;font-size:11px;color:rgba(234,243,255,.6);
    animation:soft 2.4s ease-in-out infinite;}

  /* ---------- ACT 3 : finale ---------- */
  .card{max-width:520px;}
  /* original "midnight" motif — clock at twelve, not an album cover */
  .midnight{width:128px;height:128px;margin:0 auto 26px;position:relative;border-radius:50%;
    background:radial-gradient(circle at 50% 38%, #21346b 0%, #0d1b3e 60%, #060d22 100%);
    border:1px solid rgba(243,212,136,.4);
    box-shadow:0 0 36px rgba(40,70,140,.6), inset 0 0 28px rgba(0,0,0,.6);
    animation:floaty 5s ease-in-out infinite;}
  .midnight svg{position:absolute;inset:0;width:100%;height:100%;}
  @keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
  .card .display{font-size:clamp(34px,9vw,58px);}
  .lyric{font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:clamp(17px,4.4vw,22px);color:var(--gold);margin:20px auto 0;max-width:26ch;}
  .credit{font-family:'Jost';font-weight:300;letter-spacing:.16em;text-transform:uppercase;
    font-size:11px;color:rgba(234,243,255,.5);margin-top:12px;}
  .listen{display:inline-flex;align-items:center;gap:8px;margin-top:30px;text-decoration:none;
    font-family:'Jost';font-weight:400;letter-spacing:.14em;text-transform:uppercase;font-size:11px;
    color:var(--midnight);background:linear-gradient(115deg,#fff,var(--gold) 55%,var(--gold-soft));
    padding:13px 26px;border-radius:999px;transition:.3s;
    box-shadow:0 6px 22px rgba(243,212,136,.35);}
  .listen:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(243,212,136,.55);}
  .replay{margin-top:34px;font-family:'Jost';font-weight:300;letter-spacing:.16em;
    text-transform:uppercase;font-size:10px;color:rgba(234,243,255,.4);
    border-bottom:1px solid rgba(234,243,255,.2);padding-bottom:3px;cursor:pointer;transition:.3s;}
  .replay:hover{color:#fff;border-color:#fff;}

  .conf{position:fixed;z-index:5;pointer-events:none;will-change:transform,opacity;border-radius:1px;}
  .spark{position:fixed;z-index:5;pointer-events:none;will-change:transform,opacity;}
</style>
</head>
<body>
<div id="stars"></div>

<!-- ACT 1 -->
<section class="stage active" data-stage="0">
  <div class="diamond" id="theGem">
    <span class="ring"></span>
    <svg viewBox="0 0 100 100">
      <defs>
        <linearGradient id="goldline" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#fff7e0"/>
          <stop offset=".5" stop-color="#f3d488"/>
          <stop offset="1" stop-color="#d8a94e"/>
        </linearGradient>
      </defs>
      <polygon class="line" points="50,6 80,38 50,96 20,38"/>
      <line class="line" x1="20" y1="38" x2="80" y2="38"/>
      <polygon class="line" points="50,6 36,38 50,38 64,38"/>
      <line class="line" x1="36" y1="38" x2="50" y2="96"/>
      <line class="line" x1="64" y1="38" x2="50" y2="96"/>
    </svg>
  </div>
</section>

<!-- ACT 2 -->
<section class="stage" data-stage="1">
  <div class="eyebrow">Make a wish</div>
  <div class="cake" id="theCake">
    <div class="candle"><span class="flame"></span><span class="smoke"></span></div>
    <div class="glass"><span class="band"></span></div>
  </div>
  <div class="cake-hint">点击蜡烛 · 许个愿 · 吹灭它</div>
</section>

<!-- ACT 3 -->
<section class="stage" data-stage="2">
  <div class="card">
    <div class="midnight">
      <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="2.4" fill="#f3d488"/>
        <line x1="50" y1="50" x2="50" y2="22" stroke="#f3d488" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="50" y1="50" x2="50" y2="30" stroke="#eaf3ff" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="50" cy="14" r="1.6" fill="#eaf3ff"/>
        <circle cx="78" cy="34" r="1.1" fill="#c9a3ff"/>
        <circle cx="26" cy="70" r="1.1" fill="#fff"/>
        <circle cx="72" cy="74" r="1.1" fill="#f3d488"/>
      </svg>
    </div>
    <div class="eyebrow">Welcome to twenty-three</div>
    <h1 class="display">Happy Birthday,<br><span class="name">Emily!</span></h1>
    <!-- ↓↓↓ 想换成歌词，只改下面这行双引号里的字，引号和标签都别动 ↓↓↓ -->
    <p class="lyric">“Some people walk in and the whole night starts to glow.”</p>
    <p class="credit">— Bejeweled, Taylor Swift</p>
    <a class="listen" href="https://open.spotify.com/track/3qoftcUZaUOncvIYjFSPdE" target="_blank" rel="noopener">▶ Listen on Spotify</a>
    <div class="replay" id="replay">Tap to shimmer again</div>
  </div>
</section>

<script>
const body=document.body;
const stages=[...document.querySelectorAll('.stage')];
let cur=0;
function go(n){stages[cur].classList.remove('active');cur=n;stages[cur].classList.add('active');}

/* tap-anywhere gold spark burst */
const GEMS=['✦','✧','◆'];
const COLORS=['#f3d488','#dfe7f5','#c9a3ff','#ffffff'];
function burst(x,y,count=8){
  for(let i=0;i<count;i++){
    const s=document.createElement('span');s.className='spark';
    s.textContent=GEMS[Math.floor(Math.random()*GEMS.length)];
    s.style.cssText=`left:${x}px;top:${y}px;font-size:${9+Math.random()*14}px;color:${COLORS[Math.floor(Math.random()*COLORS.length)]};text-shadow:0 0 9px currentColor;`;
    document.body.appendChild(s);
    const a=Math.random()*Math.PI*2,d=40+Math.random()*80;
    const dx=Math.cos(a)*d,dy=Math.sin(a)*d-26;
    s.animate([
      {transform:'translate(0,0) scale(0) rotate(0)',opacity:1},
      {transform:`translate(${dx}px,${dy}px) scale(1) rotate(${Math.random()*360}deg)`,opacity:1,offset:.5},
      {transform:`translate(${dx*1.4}px,${dy*1.4+90}px) scale(.3) rotate(${Math.random()*360}deg)`,opacity:0}
    ],{duration:1100+Math.random()*500,easing:'cubic-bezier(.2,.7,.3,1)'}).onfinish=()=>s.remove();
  }
}
/* gold & silver ribbon confetti */
function confetti(n=90){
  const cols=['#f3d488','#dfe7f5','#d8a94e','#ffffff','#c9a3ff'];
  for(let i=0;i<n;i++){
    const c=document.createElement('span');c.className='conf';
    const w=4+Math.random()*5,h=9+Math.random()*14;
    c.style.cssText=`left:${Math.random()*100}vw;top:-20px;width:${w}px;height:${h}px;background:${cols[Math.floor(Math.random()*cols.length)]};opacity:.95;`;
    document.body.appendChild(c);
    const dx=(Math.random()-.5)*240, rot=Math.random()*720-360;
    c.animate([
      {transform:`translate(0,0) rotate(0)`,opacity:1},
      {transform:`translate(${dx}px,${innerHeight+60}px) rotate(${rot}deg)`,opacity:.9}
    ],{duration:2600+Math.random()*1800,easing:'cubic-bezier(.25,.6,.4,1)'}).onfinish=()=>c.remove();
  }
}
function pos(e){if(e.touches&&e.touches[0])return{x:e.touches[0].clientX,y:e.touches[0].clientY};return{x:e.clientX,y:e.clientY};}
body.addEventListener('click',e=>{const{x,y}=pos(e);burst(x,y,7);});

/* ACT 1 -> 2 */
document.getElementById('theGem').addEventListener('click',e=>{
  const{x,y}=pos(e);burst(x,y,24);setTimeout(()=>go(1),320);
});
/* ACT 2 -> 3 : blow out */
document.getElementById('theCake').addEventListener('click',function(e){
  e.stopPropagation();
  if(this.classList.contains('out'))return;
  this.classList.add('out');
  const r=this.getBoundingClientRect();
  burst(r.left+r.width/2,r.top-40,18);
  setTimeout(()=>{go(2);confetti(110);
    rain=setInterval(()=>confetti(10),1100);
  },950);
});
/* replay */
let rain=null;
document.getElementById('replay').addEventListener('click',e=>{
  e.stopPropagation();clearInterval(rain);
  document.getElementById('theCake').classList.remove('out');go(0);
});
if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches){
  document.querySelectorAll('*').forEach(el=>el.style.animation='none');
}
</script>
</body>
</html>
